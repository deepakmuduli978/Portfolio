<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Portfolio | Developer Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Portfolio</div>
            <div class="menu-btn">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="section">
        <div class="container">
            <div class="hero">
             <!-- Replace this: -->
 

        <!-- With this: -->
        <img src="picture/deepak.png" alt="Profile" class="profile-img">
                <h1>Mr.Deepak</h1>
                <div class="typed-text"></div>
                <a href="#projects" class="btn btn-primary">View Projects</a>
                <a href="#contact" class="btn btn-secondary">Contact Me</a>
            </div>
        </div>
    </section>

    <section id="skills" class="section">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: white;">My Skills</h2>
            <div class="skills-grid" id="skills-grid"></div>
        </div>
    </section>

    <section id="projects" class="section">
        <div class="container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: white;">My Projects</h2>
            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </section>

    <section id="contact" class="section">
        <div class="container">
            <div class="contact-container">
                <div>
                    <h3>Get In Touch</h3>
                    <p style="margin: 1rem 0;">Have a project in mind? Let's work together!</p>
                    <form class="contact-form" id="contact-form">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                        <textarea placeholder="Your Message" required></textarea>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
                <div>
                    <h3>Connect With Me</h3>
                    <div class="social-links">
                        <a href="#" class="social-link"><i class="fab fa-github"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                    </div>
                    <div style="margin-top: 2rem;">
                        <p><i class="fas fa-envelope"></i> deepakmuduli@gmail.com</p>
                        <p><i class="fas fa-phone"></i> +91 63xxxxx78</p>
                        <p><i class="fas fa-map-marker-alt"></i>India, Odisha</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title"></h2>
            <p id="modal-description"></p>
        </div>
    </div>
    <script src="script.js"></script>
   </body>
   </html>
